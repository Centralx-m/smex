        }

        .file-tree ul.hidden {
            display: none;
        }

        .file-tree li {
            position: relative;
            padding: 2px 0 2px 16px;
            cursor: pointer;
            transition: 0.15s;
            border-radius: 4px;
        }

        .file-tree li:hover {
            background: #f7fafc;
        }

        .file-tree li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            width: 12px;
            height: 1px;
            background: #cbd5e0;
        }

        .file-tree li:last-child::after {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            height: calc(100% - 12px);
            width: 1px;
            background: #fff;
        }

        .file-tree .folder {
            color: #0f3460;
            font-weight: 600;

            color: #fff;

            color: #fff;

            color: #fff;

            background: #4eaa25;
            color: #fff;
        }

        }
        .badge-doc {

            font-size: 12px;
            color: #a0aec0;
            transition: 0.2s;
        }

        .file-tree .toggle.open {

            right: 30px;

            border-radius: 10px;
            font-weight: 600;

            transition: 0.4s;

        // =============================================
        // 2. RENDER FILE TREE
        // =============================================

        function renderTree(node, isRoot = true) {
            let html = '';

            if (isRoot) {
                html += `<ul class="root">`;
            }

            if (node.type === 'folder') {
                const hasChildren = node.children && node.children.length > 0;
                const id = 'folder-' + Math.random().toString(36).substr(2, 9);

                html += `<li class="folder-item" data-folder="${id}">
                            <span class="file-item">
                                <span class="toggle open" onclick="toggleFolder('${id}')">▶</span>
                                <span class="icon">📁</span>
                                <span class="folder">${node.name}</span>
                                <span style="font-size:11px; color:#718096; margin-left:6px;">${node.children ? node.children.length : 0} items</span>
                            </span>
                            <ul id="${id}" class="folder-content">`;

                if (hasChildren) {
                    node.children.forEach(child => {
                        html += renderTree(child, false);
                    });
                }

                html += `</ul></li>`;
            } else {
                // File
                const ext = node.ext || 'txt';
                const badgeClass = getBadgeClass(ext);
                const icon = getFileIcon(ext);

                html += `<li class="file-item">
                            <span class="file-item">
                                <span class="icon">${icon}</span>
                                <span class="file">${node.name}</span>
                                <span class="ext">.${ext}</span>
                                <span class="badge ${badgeClass}">${ext.toUpperCase()}</span>
                            </span>
                        </li>`;
            }

            if (isRoot) {
                html += `</ul>`;
            }

            return html;
        }

        function getBadgeClass(ext) {
            const map = {
                ts: 'badge-ts',
                tsx: 'badge-ts',
                js: 'badge-js',
                json: 'badge-json',
                css: 'badge-css',
                html: 'badge-html',
                md: 'badge-md',
                sh: 'badge-sh',
                yaml: 'badge-yaml',
                env: 'badge-env',
                git: 'badge-git',
                docx: 'badge-doc',
                pdf: 'badge-doc',
                csv: 'badge-doc',
                txt: 'badge-doc',
                ico: 'badge-doc',
                geojson: 'badge-json',
                doc: 'badge-doc'
            };
            return map[ext] || 'badge-doc';
        }

        function getFileIcon(ext) {
            const map = {
                ts: '📄',
                tsx: '⚛️',
                js: '📜',
                json: '📋',
                css: '🎨',
                html: '🌐',
                md: '📓',
                sh: '💻',
                yaml: '⚙️',
                env: '🔐',
                git: '🔒',
                docx: '📝',
                pdf: '📄',
                csv: '📊',
                txt: '📃',
                ico: '🖼️',
                geojson: '🗺️',
                doc: '📄'
            };
            return map[ext] || '📄';
        }

        // =============================================
        // 3. TOGGLE FOLDER
        // =============================================

        function toggleFolder(id) {
            const ul = document.getElementById(id);
            const toggle = document.querySelector(`[data-folder="${id}"] .toggle`);
            if (ul) {
                ul.classList.toggle('hidden');
                if (toggle) {
                    toggle.classList.toggle('open');
                }
            }
        }

        function expandAll() {
            document.querySelectorAll('.folder-content').forEach(el => {
                el.classList.remove('hidden');
            });
            document.querySelectorAll('.toggle').forEach(el => {
                el.classList.add('open');
            });
            showToast('📂 All folders expanded', 'success');
        }

        function collapseAll() {
            document.querySelectorAll('.folder-content').forEach(el => {
                el.classList.add('hidden');
            });
            document.querySelectorAll('.toggle').forEach(el => {
                el.classList.remove('open');
            });
            showToast('📁 All folders collapsed', 'success');
        }

        // =============================================
        // 4. SEARCH
        // =============================================

        function searchFiles(query) {
            const items = document.querySelectorAll('.file-item');
            const q = query.toLowerCase().trim();

            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (q === '' || text.includes(q)) {
                    item.style.display = '';
                    // Expand parent folders
                    let parent = item.closest('li');
                    while (parent) {
                        const folderContent = parent.querySelector('.folder-content');
                        if (folderContent) {
                            folderContent.classList.remove('hidden');
                            const toggle = parent.querySelector('.toggle');
                            if (toggle) toggle.classList.add('open');
                        }
                        parent = parent.parentElement?.closest('li');
                    }
                } else {
                    item.style.display = 'none';
                }
            });

            const visible = document.querySelectorAll('.file-item:not([style*="display: none"])');
            document.getElementById('fileCount').textContent = `${visible.length} visible items`;
        }

        // =============================================
        // 5. EXPORT STRUCTURE
        // =============================================

        function exportStructure() {
            const data = JSON.stringify(fileStructure, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'file-structure.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 File structure exported as JSON', 'success');
        }

        // =============================================
        // 6. COUNT STATS
        // =============================================

        function countItems(node) {
            let files = 0;
            let folders = 0;

            if (node.type === 'folder') {
                folders++;
                if (node.children) {
                    node.children.forEach(child => {
                        const counts = countItems(child);
                        files += counts.files;
                        folders += counts.folders;
                    });
                }
            } else {
                files++;
            }

            return { files, folders };
        }

        // =============================================
        // 7. TOAST NOTIFICATION
        // =============================================

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // =============================================
        // 8. INIT
        // =============================================

        document.addEventListener('DOMContentLoaded', function() {
            // Render tree
            const treeContainer = document.getElementById('fileTree');
            treeContainer.innerHTML = renderTree(fileStructure, true);

            // Update stats
            const stats = countItems(fileStructure);
            document.getElementById('totalFiles').textContent = stats.files;
            document.getElementById('totalFolders').textContent = stats.folders;
            document.getElementById('totalItems').textContent = stats.files + stats.folders;
            document.getElementById('statFiles').textContent = stats.files;
            document.getElementById('statFolders').textContent = stats.folders;

            // Estimate lines of code (rough)
            const estLines = stats.files * 45;
            document.getElementById('statLines').textContent = estLines.toLocaleString();

            // Estimate size (rough)
            const estSize = (stats.files * 2.5);
            if (estSize > 1024) {
                document.getElementById('statSize').textContent = (estSize / 1024).toFixed(1) + ' MB';
            } else {
                document.getElementById('statSize').textContent = estSize.toFixed(1) + ' KB';
            }

            // File count
            document.getElementById('fileCount').textContent = `${stats.files + stats.folders} total items`;

            // Search
            document.getElementById('searchInput').addEventListener('input', function() {
                searchFiles(this.value);
            });

            // Welcome
            setTimeout(() => {
                showToast(`📁 ${stats.files} files, ${stats.folders} folders loaded`, '');
            }, 500);
        });
    </script>

</body>
</html>
