                    <html><head><meta charset="UTF-8"><title>${doc.title}</title>
                    <style>body{font-family:'Segoe UI',sans-serif;padding:40px;max-width:900px;margin:0 auto;line-height:1.6;}
                    h1,h2,h3{color:#0f3460;} table{border-collapse:collapse;width:100%;margin:16px 0;}
                    th,td{border:1px solid #ccc;padding:8px 12px;text-align:left;} th{background:#f0f4f8;}
                    pre{background:#f8f9fa;padding:16px;border-radius:8px;overflow-x:auto;}
                    blockquote{border-left:4px solid #e94560;padding:8px 20px;background:#fef0f2;}
                    </style></head><body>
                    <h1>${doc.title}</h1>
                    <hr>
                    ${doc.content.replace(/\n/g, '<br>')}
                    </body></html>
                    `;
                    downloadFile(fullHtml, `${filename}.html`, 'text/html');
                    showToast('🌐 Downloading HTML version...', 'success');
                    return;

                case 'txt':
                    downloadFile(doc.content, `${filename}.txt`, 'text/plain');
                    showToast('📃 Downloading TXT version...', 'success');
                    return;

                case 'md':
                    downloadFile(doc.content, `${filename}.md`, 'text/markdown');
                    showToast('📓 Downloading Markdown version...', 'success');
                    return;

                default:
                    showToast('❌ Unknown format', 'error');
            }
        }

        // ----------------------------------------------
        // 4. DOWNLOAD HELPER
        // ----------------------------------------------
        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ----------------------------------------------
        // 5. EXPORT ALL
        // ----------------------------------------------
        function exportAll(type) {
            if (type === 'pdf') {
                showToast('📄 Generating combined PDF for all documents... (Open in browser and print to PDF)', 'success');
                // Build combined HTML with all documents
                let combined = `
                <!DOCTYPE html>
                <html><head><meta charset="UTF-8"><title>All Project Documents</title>
                <style>body{font-family:'Segoe UI',sans-serif;padding:40px;max-width:1000px;margin:0 auto;line-height:1.6;}
                .doc-section{border-bottom:2px solid #e94560;padding-bottom:20px;margin-bottom:30px;page-break-after:always;}
                h1{color:#0f3460;} h2{color:#e94560;margin-top:30px;}
                table{border-collapse:collapse;width:100%;margin:16px 0;}
                th,td{border:1px solid #ccc;padding:8px 12px;text-align:left;} th{background:#f0f4f8;}
                pre{background:#f8f9fa;padding:16px;border-radius:8px;overflow-x:auto;}
                blockquote{border-left:4px solid #e94560;padding:8px 20px;background:#fef0f2;}
                @media print{body{padding:20px;} .doc-section{page-break-after:always;}}
                </style></head><body>
                <h1>📄 PRIVATE PARTY ELECTION MONITORING SYSTEM</h1>
                <h2>Complete Project Documentation</h2>
                <p><strong>Bauchi State</strong> · 20 LGAs · 212 Wards · 4,074 Polling Units · ₦450,000 Budget</p>
                <hr>
                `;

                documents.forEach(d => {
                    combined += `
                    <div class="doc-section">
                        <h2>DOCUMENT #${String(d.id).padStart(2, '0')}: ${d.title}</h2>
                        <p><em>${d.desc}</em></p>
                        <hr>
                        ${d.content.replace(/\n/g, '<br>')}
                    </div>
                    `;
                });

                combined += '</body></html>';
                downloadFile(combined, 'ALL_PROJECT_DOCUMENTS.html', 'text/html');
                return;
            }

            if (type === 'zip') {
                showToast('📦 Generating ZIP file with all documents... (download as individual files)', 'success');
                // Download each document as .md
                documents.forEach(d => {
                    downloadFile(d.content, `${d.fileName}.md`, 'text/markdown');
                });
                // Also download the CSV template separately
                const csvDoc = documents.find(d => d.id === 8);
                if (csvDoc) {
                    downloadFile(csvDoc.content, `${csvDoc.fileName}.csv`, 'text/csv');
                }
                showToast('📦 All documents downloaded! Check your downloads folder.', 'success');
            }
        }

        // ----------------------------------------------
        // 6. TOAST NOTIFICATION
        // ----------------------------------------------
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            // Force reflow
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // ----------------------------------------------
        // 7. SEARCH
        // ----------------------------------------------
        document.getElementById('searchInput').addEventListener('input', function() {
            renderDocs(this.value);
        });

        // ----------------------------------------------
        // 8. INIT
        // ----------------------------------------------
        renderDocs();

        // Show welcome toast
        setTimeout(() => {
            showToast('📄 9 documents ready · Click any download button', '');
        }, 500);
    </script>

</body>
</html>
