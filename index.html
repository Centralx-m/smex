<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAAGC – Election Monitoring System</title>
    <meta name="description" content="Private party election monitoring system for Bauchi State. Real-time agent tracking, results collation, and incident management." />
    <meta name="theme-color" content="#0f3460" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="TAAGC – Election Monitoring System" />
    <meta property="og:description" content="Private party election monitoring system for Bauchi State. 20 LGAs, 212 Wards, 4,074 Polling Units." />
    <meta property="og:image" content="/images/logo/logo-og-image.png" />
    <meta property="og:url" content="https://taagc.site" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/logo/logo-favicon.ico" />
    <link rel="apple-touch-icon" href="/images/logo/logo-favicon.ico" />

    <!-- CSS -->
    <link rel="stylesheet" href="/src/assets/css/styles.css" />
    <link rel="stylesheet" href="/src/assets/css/responsive.css" />
    <link rel="stylesheet" href="/src/assets/css/animations.css" />

    <!-- Fonts (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
        <!-- Navbar content will be injected by JS -->
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <!-- Sections will be rendered by JS -->
        <div id="app"></div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer" id="footer" role="contentinfo">
        <!-- Footer content will be injected by JS -->
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script type="module" src="/src/assets/js/main.js"></script>

    <!-- Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/src/assets/js/service-worker.js');
            });
        }
    </script>
</body>
</html>
